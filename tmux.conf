# Fix Option+Backspace to delete whole word
set -g default-terminal "screen-256color"
set -as terminal-overrides ',*:kbs=\177'
bind-key -n M-BSpace send-keys M-BSpace

# Mouse support
set -g mouse on

# macOS-style copy with mouse selection
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 5 min + immediately whenever a terminal closes
set -g @continuum-save-interval '5'
set-hook -g client-detached 'run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh'

# Don't restore pane commands (just restore the shell + directory)
set -g @resurrect-processes 'false'

# Keep server alive even if all sessions close
set -g exit-empty off

# Initialize TPM (keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'
